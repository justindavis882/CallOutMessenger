<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Out Messenger</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="lp-hero">
        <img href="icon-512.png" alt="Logo image">
        <h2>Welcome to Call Out</h2>
        <p>Your next messenger!</p>
    </div>
    <div id="auth-container">
        <h2>Welcome to Call Out</h2>
        <input type="email" id="email" placeholder="Email" required><br><br>
        <input type="password" id="password" placeholder="Password" required><br><br>
        
        <button id="signup-btn">Sign Up</button>
        <button id="login-btn">Log In</button>
        <p id="auth-error" style="color: red;"></p>
    </div>

    <div id="profile-setup-container" class="hidden">
        <h2>Choose Your Username</h2>
        <p>You're authenticated! Now, what should people call you?</p>
        <input type="text" id="setup-username" placeholder="Username" required><br><br>
        
        <button id="save-profile-btn">Save Profile</button>
        <p id="setup-error" style="color: red;"></p>
    </div>

    <div id="app-container" class="hidden">
        
        <div id="sidebar">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>Messages</h3>
                <button id="open-profile-btn" style="width: auto; padding: 5px 10px; margin: 0; margin-right: 5px;">Profile</button>
                <button id="logout-btn" style="width: auto; padding: 5px 10px; margin: 0;">Log Out</button>
            </div>
            <hr>
            <input type="text" id="user-search" placeholder="Enter exact username...">
            <button id="search-btn">Start Chat</button>
            <p id="search-error" style="color: #ffcccc; font-size: 14px;"></p>
            
            <hr style="border-color: var(--glass-border); margin-top: 20px;">
            <h4 style="margin-bottom: 10px;">Recent Contacts</h4>
            <div id="contacts-list" style="max-height: 300px; overflow-y: auto;">
                </div>
        </div>

        <div id="chat-area" class="hidden">
            <h3 id="active-chat-name">Chat</h3>
            <div id="chat-window"></div>
            
            <div style="display: flex; gap: 10px;">
                <input type="text" id="message-input" placeholder="Type a message...">
                <button id="send-btn" style="width: 80px;">Send</button>
            </div>
        </div>

    </div>

    <div id="profile-container" class="hidden">
        <h2 style="text-align: center;">Edit Profile</h2>
        
        <img id="avatar-preview" class="avatar-preview" src="https://via.placeholder.com/150?text=Avatar" alt="Avatar">
        <input type="file" id="avatar-upload" accept="image/png, image/jpeg, image/webp">
        
        <label for="theme-picker" style="display: block; margin-top: 15px;">App Theme Color:</label>
        <input type="color" id="theme-picker" value="#764ba2">
        
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button id="save-profile-btn">Save Changes</button>
            <button id="close-profile-btn" style="background: rgba(255,255,255,0.2); color: white;">Cancel</button>
        </div>
        <p id="profile-message" style="text-align: center; margin-top: 10px;"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
